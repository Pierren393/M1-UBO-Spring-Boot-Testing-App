services:
  # ---------- API GATEWAY ----------
  api-gateway:
    image: gitlab-depinfo.univ-brest.fr:5050/e22002182/apis/api-gateway:v1.0.0
    ports:
      - "12021:8080"
    depends_on:
      - authentication-api
      - poster-api

  # ---------- AUTHENTICATION MICROSERVICE ----------
  authentication-api:
    image: gitlab-depinfo.univ-brest.fr:5050/e22002182/apis/authentication-api:v1.0.0
    ports:
      - "12022:8080"
    restart: on-failure
    environment:
      spring.datasource.url: jdbc:mariadb://obiwan.univ-brest.fr:3306/e22002182_db2
      spring.datasource.username: e22002182sql
      spring.datasource.password: 20ok2UVf
      spring.jpa.hibernate.ddl-auto: update

  # ---------- POSTER MICROSERVICE ----------
  poster-api:
    image: gitlab-depinfo.univ-brest.fr:5050/e22002182/apis/poster-api:v1.0.0
    ports:
      - "12024:8080"
    environment:
      # En local, on pointe vers notre faux 'obiwan'
      spring.data.mongodb.uri: mongodb://mongodb-local:27017/e22002182
    depends_on:
      - mongodb-local

  # Base MongoDB locale pour simuler Obiwan
  mongodb-local:
    image: mongo:latest
    ports:
      - "27017:27017"

  # ---------- FRONTEND VOD-CLIENT ----------
  vod-client:
    image: gitlab-depinfo.univ-brest.fr:5050/e22002182/apis/vod-client:latest
    ports:
      - "12020:80"
    restart: on-failure
    depends_on:
      - api-gateway

networks:
  default:
    ipam:
      config:
        - subnet: 10.5.0.0/16
