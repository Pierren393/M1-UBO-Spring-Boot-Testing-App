services:
  # ---------- API GATEWAY ----------
  gateway:
    container_name: gateway-prod
    image: gitlab-depinfo.univ-brest.fr:5050/e22002182/apis/api-gateway:v1.0.0
    ports:
      - "12021:8080"
    environment:
      AUTH_SERVICE_URI: "http://authentication-api:8080"
      POSTER_SERVICE_URI: "http://poster-api:8080"
      USER_SERVICE_URI: "http://info-tpsi.univ-brest.fr:12063"
      MOVIE_SERVICE_URI: "http://info-tpsi.univ-brest.fr:12093"
      RESERVATION_SERVICE_URI: "http://info-tpsi.univ-brest.fr:12091"
      ARTIST_SERVICE_URI: "http://info-tpsi.univ-brest.fr:12121"
      REVIEW_SERVICE_URI: "http://info-tpsi.univ-brest.fr:12065"
      PAYMENT_SERVICE_URI: "http://info-tpsi.univ-brest.fr:12044"
      SCRAPPING_SERVICE_URI: "http://info-tpsi.univ-brest.fr:12062"
    restart: unless-stopped
    depends_on:
      - authentication-api
      - poster-api
      - payment-api
      - reservation-api
    extra_hosts:
      - "info-tpsi.univ-brest.fr:172.18.4.22"

  # ---------- AUTHENTICATION SERVICE ----------
  authentication-api:
    container_name: authentication-api-prod
    image: gitlab-depinfo.univ-brest.fr:5050/e22002182/apis/authentication-api:v1.0.0
    ports:
      - "12022:8080"
    environment:
      spring.datasource.url: ${SPRING_DATASOURCE_URL:jdbc:mariadb://obiwan.univ-brest.fr:3306/e22002182_db2}
      spring.datasource.username: ${SPRING_DATASOURCE_USERNAME:e22002182sql}
      spring.datasource.password: ${SPRING_DATASOURCE_PASSWORD:20ok2UVf}
    restart: unless-stopped

  # ---------- POSTER SERVICE ----------
  poster-api:
    container_name: poster-api-prod
    image: gitlab-depinfo.univ-brest.fr:5050/e22002182/apis/poster-api:v1.0.0
    ports:
      - "12024:8080"
    environment:
      spring.data.mongodb.uri: ${MONGODB_URI:mongodb://obiwan.univ-brest.fr:27017/e22002182}
    restart: unless-stopped

  # ---------- PAYMENT SERVICE ----------
  payment-api:
    container_name: payment-api-prod
    image: gitlab-depinfo.univ-brest.fr:5050/e22002182/apis/payment-api:v1.0.0
    ports:
      - "12025:8080"
    environment:
      spring.datasource.url: ${SPRING_DATASOURCE_URL:jdbc:mariadb://obiwan.univ-brest.fr:3306/e22002182_db2}
      spring.datasource.username: ${SPRING_DATASOURCE_USERNAME:e22002182sql}
      spring.datasource.password: ${SPRING_DATASOURCE_PASSWORD:20ok2UVf}
    restart: unless-stopped

  # ---------- RESERVATION SERVICE ----------
  reservation-api:
    container_name: reservation-api-prod
    image: gitlab-depinfo.univ-brest.fr:5050/e22002182/apis/reservation-api:v1.0.0
    ports:
      - "12026:8080"
    environment:
      spring.datasource.url: ${SPRING_DATASOURCE_URL:jdbc:mariadb://obiwan.univ-brest.fr:3306/e22002182_db2}
      spring.datasource.username: ${SPRING_DATASOURCE_USERNAME:e22002182sql}
      spring.datasource.password: ${SPRING_DATASOURCE_PASSWORD:20ok2UVf}
    restart: unless-stopped

  # ---------- FRONTEND ----------
  vod-client:
    container_name: vod-client-prod
    image: gitlab-depinfo.univ-brest.fr:5050/e22002182/apis/vod-client:v1.0.0
    ports:
      - "12020:80"
    depends_on:
      - gateway
    restart: unless-stopped
