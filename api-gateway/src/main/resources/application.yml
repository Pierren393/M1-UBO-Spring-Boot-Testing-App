spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: "*"
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowed-headers: "*"
            allow-credentials: true
      routes:
        - id: authentication-api
          uri: ${AUTH_SERVICE_URI:http://authentication-api:8080}
          predicates:
            - Path=/user/**, /auth/**, /user, /auth
        - id: poster-api
          uri: ${POSTER_SERVICE_URI:http://poster-api:8080}
          predicates:
            - Path=/poster/**, /poster
        - id: movie-service
          uri: ${MOVIE_SERVICE_URI:http://movie-service:8080}
          predicates:
            - Path=/movies/**
        - id: user-service
          uri: ${USER_SERVICE_URI:http://user-service:8080}
          predicates:
            - Path=/users/**
        - id: reservation-service
          uri: ${RESERVATION_SERVICE_URI:http://reservation-service:8080}
          predicates:
            - Path=/reservations/**
        - id: artist-service
          uri: ${ARTIST_SERVICE_URI:http://artist-service:8080}
          predicates:
            - Path=/artists/**
        - id: review-service
          uri: ${REVIEW_SERVICE_URI:http://review-service:8080}
          predicates:
            - Path=/reviews/**
        - id: payment-service
          uri: ${PAYMENT_SERVICE_URI:http://payment-service:8080}
          predicates:
            - Path=/payments/**
        - id: scrapping-service
          uri: ${SCRAPPING_SERVICE_URI:http://scrapping-service:8080}
          predicates:
            - Path=/scrapping/**

server:
  port: 8080
