services:
  # ---------- DATABASES (LOCAL) ----------
  auth-db:
    image: mariadb:11.6
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MARIADB_DATABASE: e22002182_db2
      MARIADB_ROOT_PASSWORD: root
    volumes:
      - auth_data:/var/lib/mysql

  poster-db:
    image: mongo:latest
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - poster_data:/data/db

  # ---------- API GATEWAY ----------
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "12021:8080"
    depends_on:
      - authentication-api
      - poster-api

  # ---------- AUTHENTICATION SERVICE ----------
  authentication-api:
    build:
      context: .
      dockerfile: authentication-api/Dockerfile
    ports:
      - "12022:8080"
    depends_on:
      - auth-db
    environment:
      spring.datasource.url: jdbc:mariadb://auth-db:3306/e22002182_db2
      spring.datasource.username: root
      spring.datasource.password: root

  # ---------- POSTER SERVICE ----------
  poster-api:
    build:
      context: .
      dockerfile: poster-api/Dockerfile
    ports:
      - "12024:8080"
    depends_on:
      - poster-db
    environment:
      spring.data.mongodb.uri: mongodb://poster-db:27017/poster_db

  # ---------- FRONTEND ----------
  vod-client:
    build:
      context: ./vod-client
    ports:
      - "12020:80"
    depends_on:
      - api-gateway

volumes:
  auth_data:
  poster_data:
