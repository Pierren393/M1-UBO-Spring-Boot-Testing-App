services:
  poster-db:
    image: mongo:latest
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - poster_data:/data/db

  # ---------- API GATEWAY ----------
  gateway:
    container_name: gateway
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "12021:8080"
    environment:
      # On utilise les ports de ton groupe d'après ton tableau
      # En local, on peut pointer vers nos services internes
      AUTH_SERVICE_URI: "http://authentication-api:8080"
      POSTER_SERVICE_URI: "http://poster-api:8080"
      USER_SERVICE_URI: "http://info-tpsi.univ-brest.fr:12063"
      MOVIE_SERVICE_URI: "http://info-tpsi.univ-brest.fr:12093"
      RESERVATION_SERVICE_URI: "http://info-tpsi.univ-brest.fr:12091"
      ARTIST_SERVICE_URI: "http://info-tpsi.univ-brest.fr:12121"
      REVIEW_SERVICE_URI: "http://info-tpsi.univ-brest.fr:12065"
      PAYMENT_SERVICE_URI: "http://info-tpsi.univ-brest.fr:12044"
      SCRAPPING_SERVICE_URI: "http://info-tpsi.univ-brest.fr:12062"
    restart: unless-stopped
    depends_on:
      - authentication-api
      - poster-api
    extra_hosts:
      - "info-tpsi.univ-brest.fr:172.18.4.22"

  # ---------- AUTHENTICATION SERVICE ----------
  authentication-api:
    container_name: authentication-api
    build:
      context: .
      dockerfile: authentication-api/Dockerfile
    ports:
      - "12022:8080"
    environment:
      spring.datasource.url: jdbc:mariadb://obiwan.univ-brest.fr:3306/e22002182_db2
      spring.datasource.username: e22002182sql
      spring.datasource.password: 20ok2UVf

  # ---------- POSTER SERVICE ----------
  poster-api:
    container_name: poster-api
    build:
      context: .
      dockerfile: poster-api/Dockerfile
    ports:
      - "12024:8080"
    depends_on:
      - poster-db
    environment:
      spring.data.mongodb.uri: mongodb://poster-db:27017/poster_db

  # ---------- FRONTEND ----------
  vod-client:
    container_name: vod-client
    build:
      context: ./vod-client
    ports:
      - "12020:80"
    depends_on:
      - gateway

volumes:
  poster_data:
